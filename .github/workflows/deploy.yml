name: Deploy to AWS

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-northeast-1
  NODE_VERSION: '20'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build site
        env:
          VITE_CHAT_TOKEN: ${{ secrets.VITE_CHAT_TOKEN }}
        run: npm run build

      - name: Package Lambda
        run: |
          cd lambda
          zip -r ../lambda.zip .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.S3_BUCKET_REGION }}

      - name: Deploy to S3 website bucket
        run: aws s3 sync dist s3://${{ secrets.S3_BUCKET_NAME }} --delete

      - name: Update Lambda code
        run: |
          aws lambda update-function-code \
            --function-name nrb-bonds-chatbot \
            --zip-file fileb://lambda.zip || echo "Lambda update failed (non-fatal)"
          aws lambda wait function-updated \
            --function-name nrb-bonds-chatbot || true

      - name: Invalidate CloudFront distribution
        run: aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*" || echo "CloudFront invalidation failed (non-fatal)"
